<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner Superior Tablet - 768x150</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; }

.banner {
  width: 768px;
  height: 150px;
  background: linear-gradient(165deg, #001e38 0%, #0d3a5c 50%, #001e38 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 0 32px;
  position: relative;
  overflow: hidden;
}
.banner::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(0,144,190,0.15) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(50px);
}
.banner::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -40px;
  width: 250px; height: 250px;
  background: radial-gradient(circle, rgba(54,197,81,0.12) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(50px);
}
.logo { height: 55px; position: relative; z-index: 1; }
.divider { width: 1px; height: 60px; background: linear-gradient(180deg, transparent, rgba(0,144,190,0.4), transparent); position: relative; z-index: 1; }
.content { position: relative; z-index: 1; }
.title { font-size: 1.15rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 4px; }
.title span { color: #ffcb15; }
.sub { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
.badges { display: flex; gap: 10px; position: relative; z-index: 1; }
.badge { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 6px 12px; }
.badge-icon { font-size: 0.85rem; }
.badge-text { font-size: 0.6rem; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="banner">
  <img src="../logo-programa-imersao-nativa.png" alt="Imersao Nativa" class="logo">
  <div class="divider"></div>
  <div class="content">
    <h2 class="title">Falta pouco para <span>destravar seu espanhol</span></h2>
    <p class="sub">Complete sua inscricao e comece ainda hoje</p>
  </div>
  <div class="badges">
    <div class="badge"><span class="badge-icon">🔒</span><span class="badge-text">Seguro</span></div>
    <div class="badge"><span class="badge-icon">⚡</span><span class="badge-text">Imediato</span></div>
    <div class="badge"><span class="badge-icon">✅</span><span class="badge-text">7 dias</span></div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner Superior Desktop - 1920x200</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; }

.banner {
  width: 1920px;
  height: 200px;
  background: linear-gradient(165deg, #001e38 0%, #0d3a5c 50%, #001e38 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 0 60px;
  position: relative;
  overflow: hidden;
}
.banner::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(0,144,190,0.15) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(60px);
}
.banner::after {
  content: '';
  position: absolute;
  bottom: -100px; left: -50px;
  width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(54,197,81,0.12) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(60px);
}
.logo { height: 80px; position: relative; z-index: 1; }
.divider { width: 2px; height: 80px; background: linear-gradient(180deg, transparent, rgba(0,144,190,0.4), transparent); position: relative; z-index: 1; }
.content { position: relative; z-index: 1; }
.title { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 6px; }
.title span { color: #ffcb15; }
.sub { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
.badges { display: flex; gap: 16px; position: relative; z-index: 1; }
.badge { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 8px 16px; }
.badge-icon { font-size: 1.1rem; }
.badge-text { font-size: 0.72rem; color: rgba(255,255,255,0.7); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="banner">
  <img src="../logo-programa-imersao-nativa.png" alt="Imersao Nativa" class="logo">
  <div class="divider"></div>
  <div class="content">
    <h2 class="title">Falta pouco para <span>destravar seu espanhol</span></h2>
    <p class="sub">Complete sua inscricao e comece ainda hoje</p>
  </div>
  <div class="badges">
    <div class="badge"><span class="badge-icon">🔒</span><span class="badge-text">Pagamento seguro</span></div>
    <div class="badge"><span class="badge-icon">⚡</span><span class="badge-text">Acesso imediato</span></div>
    <div class="badge"><span class="badge-icon">✅</span><span class="badge-text">Garantia 7 dias</span></div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banner Topo Hotmart - 1024x341</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #999; display: flex; justify-content: center; padding: 20px; }

.banner {
  width: 1080px;
  height: 300px;
  background: linear-gradient(165deg, #001e38 0%, #0d3a5c 40%, #001e38 100%);
  display: flex;
  align-items: stretch;
  position: relative;
  overflow: hidden;
  box-shadow: inset 0 60px 60px -30px rgba(0,30,56,0.4), inset 0 -40px 40px -20px rgba(0,30,56,0.3);
}

/* Blobs */
.banner::before {
  content: '';
  position: absolute;
  top: -100px; left: 30%;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(0,144,190,0.15) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(60px);
}
.banner::after {
  content: '';
  position: absolute;
  bottom: -100px; left: 10%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(54,197,81,0.10) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(50px);
}

/* Lado esquerdo: logo + texto */
.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 40px;
  position: relative;
  z-index: 1;
}

/* Logo CSS */
.logo-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 16px;
}
.logo-tag {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  border: 1.5px solid rgba(255,255,255,0.25);
  border-radius: 50px;
  padding: 3px 12px;
  margin-bottom: 8px;
}
.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 2.8rem;
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 2px;
}
.logo-name .i { color: #1e3a7a; }
.logo-name .m { color: #1e5a9a; }
.logo-name .e { color: #1a8a4a; }
.logo-name .r { color: #2aaa3a; }
.logo-name .s { color: #c8a820; }
.logo-name .a { color: #d4952a; }
.logo-name .o { color: #e06a18; }
.logo-nativa {
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 300;
  letter-spacing: 0.45em;
  color: rgba(255,255,255,0.8);
  text-transform: uppercase;
}
.logo-line {
  width: 45px;
  height: 2px;
  background: linear-gradient(90deg, #1e3a7a, #e06a18);
  border-radius: 2px;
  margin-top: 6px;
}

.sub-text {
  font-size: 1.4rem;
  font-weight: 900;
  color: #ffffff;
  text-align: center;
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 14px;
}
.sub-text .small {
  font-size: 0.85rem;
  font-weight: 400;
  color: rgba(255,255,255,0.6);
  display: block;
  margin-top: 6px;
}

.badges {
  display: flex;
  gap: 10px;
}
.badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  padding: 6px 14px;
}
.badge-icon { font-size: 0.85rem; }
.badge-text {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.65);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Lado direito: foto da Ale */
.right {
  width: 380px;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
  box-shadow: inset 0 60px 60px -30px rgba(0,30,56,0.4), inset 0 -40px 40px -20px rgba(0,30,56,0.3);
}
.right img {
  opacity: 0.85;
  height: 110%;
  width: auto;
  object-fit: contain;
  margin-bottom: -10px;
}

/* Gradiente lateral: fusao suave com o fundo */
.right::before {
  content: '';
  position: absolute;
  top: 0; left: -20px; bottom: 0;
  width: 200px;
  background: linear-gradient(90deg, #001e38 0%, rgba(0,30,56,0.8) 50%, transparent 100%);
  z-index: 2;
}
/* Gradiente no topo */
.right .top-fade {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(180deg, #001e38 0%, transparent 100%);
  z-index: 2;
}
/* Gradiente inferior */
.right::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 100px;
  background: linear-gradient(0deg, #001e38 0%, rgba(0,30,56,0.5) 50%, transparent 100%);
  z-index: 2;
}
</style>
</head>
<body>

<div class="banner">
  <div class="left">
    <div class="logo-block">
      <div class="logo-tag">Programa Exclusivo</div>
      <div class="logo-name">
        <span class="i">I</span><span class="m">M</span><span class="e">E</span><span class="r">R</span><span class="s">S</span><span class="a">Ã</span><span class="o">O</span>
      </div>
      <div class="logo-nativa">Nativa</div>
      <div class="logo-line"></div>
    </div>

    <p class="sub-text">Falta pouco para <span style="color:#ffcb15">destravar seu espanhol</span><span class="small">Complete sua inscrição e comece ainda hoje.</span></p>

    <div class="badges">
      <div class="badge"><span class="badge-icon">🔒</span><span class="badge-text">Pagamento seguro</span></div>
      <div class="badge"><span class="badge-icon">⚡</span><span class="badge-text">Acesso imediato</span></div>
      <div class="badge"><span class="badge-icon">✅</span><span class="badge-text">Garantia 7 dias</span></div>
    </div>
  </div>

  <div class="right">
    <img src="foto-ale.jpg" alt="Alejandra Fajardo">
  </div>
</div>

</body>
</html>
